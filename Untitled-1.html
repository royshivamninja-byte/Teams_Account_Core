<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams Core Account</title>

<style>
:root {
  --brand: #2563eb;
  --brand-dark: #1d4ed8;
  --brand-soft: #dbeafe;
  --ink: #172033;
  --muted: #64748b;
  --line: #dbe3ef;
  --surface: #ffffff;
  --surface-soft: #f8fafc;
  --teal: #0f766e;
}

* {
  box-sizing: border-box;
}

body {
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 32rem),
    linear-gradient(135deg, #eef6ff 0%, #f7fbff 45%, #f2f7f5 100%);
  color: var(--ink);
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #0f172a 0%, #1e40af 58%, #0f766e 100%);
  box-shadow: 0 16px 36px rgba(15, 23, 42, 0.18);
  color: white;
  padding: 28px 20px 34px;
}

.header-inner {
  margin: 0 auto;
  max-width: 1100px;
}

.eyebrow {
  color: #bfdbfe;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  margin: 0 0 6px;
  text-transform: uppercase;
}

.header h1 {
  font-size: 34px;
  line-height: 1.15;
  margin: 0;
}

.header p:last-child {
  color: #dbeafe;
  font-size: 15px;
  line-height: 1.5;
  margin: 10px 0 0;
  max-width: 700px;
}

.container {
  margin: 0 auto;
  padding: 28px 0 42px;
  width: min(1100px, calc(100% - 32px));
}

.section-title {
  align-items: end;
  display: flex;
  gap: 20px;
  justify-content: space-between;
  margin: 2px 0 18px;
}

.section-title h2 {
  font-size: 24px;
  margin: 0;
}

.section-title span {
  color: var(--muted);
  font-size: 14px;
}

.ring-grid {
  display: grid;
  gap: 16px;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
}

.ring-card {
  background: rgba(255, 255, 255, 0.86);
  border: 1px solid rgba(219, 227, 239, 0.9);
  border-radius: 8px;
  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  color: var(--ink);
  cursor: pointer;
  min-height: 124px;
  overflow: hidden;
  padding: 18px;
  position: relative;
  transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
}

.ring-card::before {
  background: linear-gradient(135deg, var(--brand), var(--teal));
  content: "";
  height: 4px;
  left: 0;
  position: absolute;
  right: 0;
  top: 0;
}

.ring-card:hover {
  border-color: #93c5fd;
  box-shadow: 0 18px 42px rgba(37, 99, 235, 0.16);
  transform: translateY(-3px);
}

.ring-card-title {
  align-items: center;
  display: flex;
  font-size: 18px;
  font-weight: 800;
  gap: 10px;
  margin-bottom: 22px;
}

.ring-card-icon {
  align-items: center;
  background: var(--brand-soft);
  border-radius: 8px;
  color: var(--brand-dark);
  display: inline-flex;
  height: 34px;
  justify-content: center;
  width: 34px;
}

.ring-card-footer {
  align-items: center;
  color: var(--muted);
  display: flex;
  font-size: 13px;
  justify-content: space-between;
}

.panel {
  background: rgba(255, 255, 255, 0.9);
  border: 1px solid rgba(219, 227, 239, 0.9);
  border-radius: 8px;
  box-shadow: 0 18px 44px rgba(15, 23, 42, 0.1);
  padding: 22px;
}

.toolbar {
  align-items: center;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: space-between;
  margin-bottom: 18px;
}

.toolbar h2 {
  font-size: 24px;
  margin: 0;
}

.toolbar p {
  color: var(--muted);
  margin: 4px 0 0;
}

.table-wrap {
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow-x: auto;
}

table {
  background: var(--surface);
  border-collapse: collapse;
  width: 100%;
}

th,
td {
  border-bottom: 1px solid var(--line);
  padding: 12px;
}

th {
  background: var(--surface-soft);
  color: #334155;
  font-size: 12px;
  letter-spacing: 0.04em;
  text-align: left;
  text-transform: uppercase;
}

tr:last-child td {
  border-bottom: none;
}

.empty-row {
  color: var(--muted);
  font-size: 14px;
}

h3 {
  font-size: 20px;
  margin: 0;
}

label {
  color: #334155;
  display: block;
  font-size: 13px;
  font-weight: 700;
  margin: 0 0 7px;
}

input,
select {
  background: white;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  color: var(--ink);
  font: inherit;
  min-height: 42px;
  outline: none;
  padding: 9px 11px;
  transition: border-color 160ms ease, box-shadow 160ms ease;
  width: 100%;
}

input:focus,
select:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
}

.form-grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  margin-top: 14px;
}

button {
  align-items: center;
  background: linear-gradient(135deg, var(--brand), var(--brand-dark));
  border: 1px solid transparent;
  border-radius: 8px;
  box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
  color: white;
  cursor: pointer;
  display: inline-flex;
  font: inherit;
  font-weight: 800;
  gap: 8px;
  min-height: 42px;
  padding: 10px 16px;
  transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
}

button:hover {
  background: linear-gradient(135deg, #1d4ed8, #1e40af);
  box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0);
}

.button-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 16px;
}

.back-btn {
  background: white;
  border-color: var(--line);
  box-shadow: none;
  color: #334155;
}

.back-btn:hover {
  background: #f8fafc;
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
}

.secondary-btn {
  background: var(--teal);
  box-shadow: 0 10px 20px rgba(15, 118, 110, 0.16);
}

.secondary-btn:hover {
  background: #0d9488;
  box-shadow: 0 14px 28px rgba(15, 118, 110, 0.22);
}

.divider {
  border: none;
  border-top: 1px solid var(--line);
  margin: 24px 0;
}

@media (max-width: 680px) {
  .header h1 {
    font-size: 28px;
  }

  .section-title,
  .toolbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .form-grid {
    grid-template-columns: 1fr;
  }

  .panel {
    padding: 16px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <p class="eyebrow">Account Management</p>
    <h1>Teams Core Account</h1>
    <p>Choose a ring, manage credentials, and create account requests from one clean workspace.</p>
  </div>
</div>

<div class="container" id="mainPage"></div>

<div class="container" id="accountPage" style="display:none;"></div>

<script>
const rings = ["Ring 0", "Ring 1", "Ring 2", "Ring 4", "EDU", "GCCH", "DoD", "Gallatin", "Auth"];

let accountsData = {};

rings.forEach(r => accountsData[r] = []);

function loadMainPage() {
  const container = document.getElementById("mainPage");
  container.innerHTML = `
    <div class="section-title">
      <div>
        <h2>Select a ring</h2>
        <span>${rings.length} environments available</span>
      </div>
    </div>
    <div class="ring-grid">
      ${rings.map(r => `
        <div class="ring-card" onclick="openRing('${r}')">
          <div class="ring-card-title">
            <span class="ring-card-icon">O</span>
            <span>${r}</span>
          </div>
          <div class="ring-card-footer">
            <span>${accountsData[r].length} accounts</span>
            <span>Open -></span>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

function openRing(ring) {
  document.getElementById("mainPage").style.display = "none";
  const page = document.getElementById("accountPage");
  page.style.display = "block";

  renderAccounts(ring);
}

function renderAccounts(ring) {
  const page = document.getElementById("accountPage");

  page.innerHTML = `
    <div class="panel">
      <div class="toolbar">
        <div>
          <h2>${ring} Accounts</h2>
          <p>Update saved credentials or submit a new Teams account request.</p>
        </div>
        <button class="back-btn" onclick="goBack()">&lt;- Back</button>
      </div>

      <div class="table-wrap">
        <table id="accountTable">
          <thead>
            <tr>
              <th>Username</th>
              <th>Password</th>
            </tr>
          </thead>
          <tbody>
            ${accountsData[ring].map((acc, i) => `
              <tr>
                <td><input value="${acc.username}" onchange="updateField('${ring}', ${i}, 'username', this.value)" /></td>
                <td><input value="${acc.password}" onchange="updateField('${ring}', ${i}, 'password', this.value)" /></td>
              </tr>
            `).join("") || `
              <tr>
                <td class="empty-row" colspan="2">No accounts added yet.</td>
              </tr>
            `}
          </tbody>
        </table>
      </div>

      <div class="button-row">
        <button class="secondary-btn" onclick="addAccount('${ring}')">+ Add Account</button>
      </div>

      <hr class="divider">

      <h3>Create Teams Account</h3>

      <div class="form-grid">
        <div>
          <label>Username</label>
          <input id="newUsername">
        </div>

        <div>
          <label>Email</label>
          <input id="newEmail">
        </div>

        <div>
          <label>Password</label>
          <input id="newPassword" type="password">
        </div>

        <div>
          <label>License</label>
          <select id="license">
            <option>Microsoft 365 E3</option>
            <option>Microsoft 365 E5</option>
            <option>Teams Essentials</option>
          </select>
        </div>
      </div>

      <div class="button-row">
        <button onclick="createTeamsAccount('${ring}')">Create Account</button>
      </div>
    </div>
  `;
}

function updateField(ring, index, field, value) {
  accountsData[ring][index][field] = value;
}

function addAccount(ring) {
  accountsData[ring].push({ username: "", password: "" });
  renderAccounts(ring);
}

async function createTeamsAccount(ring) {
  const username = document.getElementById("newUsername").value;
  const email = document.getElementById("newEmail").value;
  const password = document.getElementById("newPassword").value;
  const license = document.getElementById("license").value;

  const payload = {
    ring,
    username,
    email,
    password,
    license
  };

  console.log("Creating account:", payload);

  // Connect to backend (Power Automate / API)
  try {
    await fetch("YOUR_FLOW_OR_API_URL", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    alert("Account creation request sent!");
  } catch (e) {
    alert("Error connecting to backend");
  }
}

function goBack() {
  document.getElementById("mainPage").style.display = "block";
  document.getElementById("accountPage").style.display = "none";
  loadMainPage();
}

loadMainPage();
</script>

</body>
</html>
