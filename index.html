<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1d4ed8">
<link rel="manifest" href="manifest.webmanifest">
<title>Teams Core Account</title>

<style>
:root {
  --brand: #2563eb;
  --brand-dark: #1d4ed8;
  --brand-soft: #dbeafe;
  --rose: #e11d48;
  --amber: #d97706;
  --ink: #172033;
  --muted: #64748b;
  --line: #dbe3ef;
  --surface: #ffffff;
  --surface-soft: #f8fafc;
  --teal: #0f766e;
}

* {
  box-sizing: border-box;
}

body {
  background:
    radial-gradient(circle at 10% 8%, rgba(37, 99, 235, 0.16), transparent 27rem),
    radial-gradient(circle at 88% 18%, rgba(225, 29, 72, 0.13), transparent 24rem),
    radial-gradient(circle at 54% 92%, rgba(15, 118, 110, 0.16), transparent 28rem),
    linear-gradient(135deg, #eef6ff 0%, #fff7ed 42%, #f2fbf7 100%);
  color: var(--ink);
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
}

.header {
  background:
    linear-gradient(135deg, rgba(15, 23, 42, 0.96) 0%, rgba(30, 64, 175, 0.95) 54%, rgba(15, 118, 110, 0.95) 100%),
    repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0 1px, transparent 1px 18px);
  box-shadow: 0 16px 36px rgba(15, 23, 42, 0.18);
  color: white;
  padding: 28px 20px 34px;
}

.header-inner {
  margin: 0 auto;
  max-width: 1100px;
}

.eyebrow {
  color: #bfdbfe;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  margin: 0 0 6px;
  text-transform: uppercase;
}

.header h1 {
  font-size: 34px;
  line-height: 1.15;
  margin: 0;
}

.header p:last-child {
  color: #dbeafe;
  font-size: 15px;
  line-height: 1.5;
  margin: 10px 0 0;
  max-width: 700px;
}

.container {
  margin: 0 auto;
  padding: 28px 0 42px;
  width: min(1100px, calc(100% - 32px));
}

.section-title {
  align-items: end;
  display: flex;
  gap: 20px;
  justify-content: space-between;
  margin: 2px 0 18px;
}

.section-title h2 {
  font-size: 24px;
  margin: 0;
}

.section-title span {
  color: var(--muted);
  font-size: 14px;
}

.ring-grid {
  display: grid;
  gap: 16px;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
}

.ring-card {
  --accent: var(--brand);
  --accent-soft: var(--brand-soft);
  background: rgba(255, 255, 255, 0.86);
  border: 1px solid rgba(219, 227, 239, 0.9);
  border-radius: 8px;
  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  color: var(--ink);
  cursor: pointer;
  min-height: 124px;
  overflow: hidden;
  padding: 18px;
  position: relative;
  transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
}

.ring-card::before {
  background: linear-gradient(135deg, var(--accent), var(--teal));
  content: "";
  height: 4px;
  left: 0;
  position: absolute;
  right: 0;
  top: 0;
}

.ring-card:hover {
  border-color: color-mix(in srgb, var(--accent), white 40%);
  box-shadow: 0 18px 42px color-mix(in srgb, var(--accent), transparent 82%);
  transform: translateY(-3px);
}

.ring-card[data-scenario="pilot"] {
  --accent: #2563eb;
  --accent-soft: #dbeafe;
}

.ring-card[data-scenario="release"] {
  --accent: #0f766e;
  --accent-soft: #ccfbf1;
}

.ring-card[data-scenario="education"] {
  --accent: #d97706;
  --accent-soft: #fef3c7;
}

.ring-card[data-scenario="secure"] {
  --accent: #7c3aed;
  --accent-soft: #ede9fe;
}

.ring-card[data-scenario="auth"] {
  --accent: #e11d48;
  --accent-soft: #ffe4e6;
}

.ring-card-title {
  align-items: center;
  display: flex;
  font-size: 18px;
  font-weight: 800;
  gap: 10px;
  margin-bottom: 22px;
}

.ring-card-icon {
  align-items: center;
  background: var(--accent-soft);
  border-radius: 8px;
  color: var(--accent);
  display: inline-flex;
  height: 34px;
  justify-content: center;
  width: 34px;
}

.ring-card-footer {
  align-items: center;
  color: var(--muted);
  display: flex;
  font-size: 13px;
  justify-content: space-between;
}

.scenario-badge {
  background: var(--accent-soft);
  border-radius: 999px;
  color: var(--accent);
  font-size: 12px;
  font-weight: 800;
  padding: 5px 9px;
}

.scenario-strip {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  margin-bottom: 20px;
}

.scenario-item {
  background: rgba(255, 255, 255, 0.78);
  border: 1px solid rgba(219, 227, 239, 0.85);
  border-radius: 8px;
  box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
  min-height: 76px;
  padding: 14px;
}

.scenario-item strong {
  display: block;
  font-size: 14px;
  margin-bottom: 5px;
}

.scenario-item span {
  color: var(--muted);
  font-size: 12px;
}

.scenario-blue {
  border-top: 4px solid var(--brand);
}

.scenario-teal {
  border-top: 4px solid var(--teal);
}

.scenario-amber {
  border-top: 4px solid var(--amber);
}

.scenario-rose {
  border-top: 4px solid var(--rose);
}

.panel {
  background: rgba(255, 255, 255, 0.9);
  border: 1px solid rgba(219, 227, 239, 0.9);
  border-radius: 8px;
  box-shadow: 0 18px 44px rgba(15, 23, 42, 0.1);
  padding: 22px;
}

.toolbar {
  align-items: center;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: space-between;
  margin-bottom: 18px;
}

.toolbar h2 {
  font-size: 24px;
  margin: 0;
}

.toolbar p {
  color: var(--muted);
  margin: 4px 0 0;
}

.table-wrap {
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow-x: auto;
}

table {
  background: var(--surface);
  border-collapse: collapse;
  width: 100%;
}

th,
td {
  border-bottom: 1px solid var(--line);
  padding: 12px;
}

.actions-col {
  width: 190px;
}

th {
  background: var(--surface-soft);
  color: #334155;
  font-size: 12px;
  letter-spacing: 0.04em;
  text-align: left;
  text-transform: uppercase;
}

tr:last-child td {
  border-bottom: none;
}

.empty-row {
  color: var(--muted);
  font-size: 14px;
}

h3 {
  font-size: 20px;
  margin: 0;
}

label {
  color: #334155;
  display: block;
  font-size: 13px;
  font-weight: 700;
  margin: 0 0 7px;
}

input,
select,
textarea {
  background: white;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  color: var(--ink);
  font: inherit;
  min-height: 42px;
  outline: none;
  padding: 9px 11px;
  transition: border-color 160ms ease, box-shadow 160ms ease;
  width: 100%;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
}

textarea {
  min-height: 96px;
  resize: vertical;
}

.form-grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  margin-top: 14px;
}

button {
  align-items: center;
  background: linear-gradient(135deg, var(--brand), var(--brand-dark));
  border: 1px solid transparent;
  border-radius: 8px;
  box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
  color: white;
  cursor: pointer;
  display: inline-flex;
  font: inherit;
  font-weight: 800;
  gap: 8px;
  min-height: 42px;
  padding: 10px 16px;
  transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
}

button:hover {
  background: linear-gradient(135deg, #1d4ed8, #1e40af);
  box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0);
}

.button-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 16px;
}

.back-btn {
  background: white;
  border-color: var(--line);
  box-shadow: none;
  color: #334155;
}

.back-btn:hover {
  background: #f8fafc;
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
}

.secondary-btn {
  background: var(--teal);
  box-shadow: 0 10px 20px rgba(15, 118, 110, 0.16);
}

.secondary-btn:hover {
  background: #0d9488;
  box-shadow: 0 14px 28px rgba(15, 118, 110, 0.22);
}

.delete-btn {
  background: #fff1f2;
  border-color: #fecdd3;
  box-shadow: none;
  color: #be123c;
  min-height: 38px;
  padding: 8px 12px;
}

.delete-btn:hover {
  background: #ffe4e6;
  box-shadow: 0 10px 20px rgba(225, 29, 72, 0.14);
  color: #9f1239;
}

.update-btn {
  background: #ecfdf5;
  border-color: #bbf7d0;
  box-shadow: none;
  color: #047857;
  min-height: 38px;
  padding: 8px 12px;
}

.update-btn:hover {
  background: #d1fae5;
  box-shadow: 0 10px 20px rgba(5, 150, 105, 0.14);
  color: #065f46;
}

.row-actions {
  display: flex;
  gap: 8px;
}

.divider {
  border: none;
  border-top: 1px solid var(--line);
  margin: 24px 0;
}

.section-stack {
  display: grid;
  gap: 22px;
}

.panel-note {
  color: var(--muted);
  font-size: 13px;
  margin: 10px 0 0;
}

.app-badge {
  background: rgba(191, 219, 254, 0.14);
  border: 1px solid rgba(191, 219, 254, 0.28);
  border-radius: 999px;
  color: #dbeafe;
  display: inline-flex;
  font-size: 12px;
  font-weight: 700;
  gap: 8px;
  margin-top: 14px;
  padding: 7px 12px;
}

@media (max-width: 680px) {
  .header h1 {
    font-size: 28px;
  }

  .section-title,
  .toolbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .form-grid {
    grid-template-columns: 1fr;
  }

  .scenario-strip {
    grid-template-columns: 1fr;
  }

  .panel {
    padding: 16px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <p class="eyebrow">Account Management</p>
    <h1>Teams Core Account</h1>
    <p>Choose a ring, manage credentials, and create account requests from one clean workspace.</p>
    <div class="app-badge">Android-ready PWA | Install from Chrome menu on Android</div>
  </div>
</div>

<div class="container" id="mainPage"></div>

<div class="container" id="accountPage" style="display:none;"></div>

<script>
const rings = ["Ring 0", "Ring 1", "Ring 2", "Ring 4", "EDU", "GCCH", "DoD", "Gallatin", "Auth"];

let accountsData = {};
let devicesData = {};
const storageKey = "teamsCoreAccountsData";
const deviceStorageKey = "teamsCoreDevicesData";
const supabaseAccountsUrl = "https://iseuuvohaskhjmblqfqr.supabase.co/rest/v1/accounts";
const supabaseDevicesUrl = "https://iseuuvohaskhjmblqfqr.supabase.co/rest/v1/devices";
const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzZXV1dm9oYXNraGptYmxxZnFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzYzNzUsImV4cCI6MjA5MjUxMjM3NX0.LnrZkxi7ajawWdQ_9k2wFuWWRgm0DaRhdlHISUH-x5Q";
const licenses = ["Microsoft 365 E3", "Microsoft 365 E5", "Teams Essentials"];
const refreshIntervalMs = 3000;
let currentRing = null;
let refreshTimer = null;
let deviceSyncAvailable = true;

const ringScenarios = {
  "Ring 0": { label: "Pilot", tone: "pilot" },
  "Ring 1": { label: "Preview", tone: "pilot" },
  "Ring 2": { label: "Release", tone: "release" },
  "Ring 4": { label: "Stable", tone: "release" },
  EDU: { label: "Education", tone: "education" },
  GCCH: { label: "Secure", tone: "secure" },
  DoD: { label: "Secure", tone: "secure" },
  Gallatin: { label: "Regional", tone: "education" },
  Auth: { label: "Identity", tone: "auth" }
};

rings.forEach(r => {
  accountsData[r] = [];
  devicesData[r] = [];
});

function resetAccountsData() {
  rings.forEach(r => accountsData[r] = []);
}

function resetDevicesData() {
  rings.forEach(r => devicesData[r] = []);
}

function getSupabaseHeaders(prefer) {
  const headers = {
    apikey: supabaseAnonKey,
    Authorization: `Bearer ${supabaseAnonKey}`,
    "Content-Type": "application/json"
  };

  if (prefer) {
    headers.Prefer = prefer;
  }

  return headers;
}

function normalizeAccount(account) {
  return {
    id: account.id || null,
    ring: account.ring || "",
    username: account.username || "",
    email: account.email || "",
    password: account.password || "",
    license: account.license || ""
  };
}

function groupAccounts(accounts) {
  resetAccountsData();

  accounts.forEach(account => {
    const normalizedAccount = normalizeAccount(account);

    if (rings.includes(normalizedAccount.ring)) {
      accountsData[normalizedAccount.ring].push(normalizedAccount);
    }
  });
}

function hasAnyAccounts() {
  return rings.some(r => accountsData[r].length > 0);
}

function hasAnyDevices() {
  return rings.some(r => devicesData[r].length > 0);
}

function getAllAccounts() {
  return rings.flatMap(r => accountsData[r].map(account => ({ ...account, ring: account.ring || r })));
}

async function loadAccountsFromSupabase() {
  try {
    const response = await fetch(`${supabaseAccountsUrl}?select=id,ring,username,email,password,license&order=created_at.asc`, {
      headers: getSupabaseHeaders()
    });

    if (!response.ok) {
      throw new Error(`Supabase load failed: ${response.status}`);
    }

    const accounts = await response.json();

    groupAccounts(accounts);
    saveAccounts();
    return accounts.length;
  } catch (e) {
    console.warn("Could not load accounts from Supabase:", e);
    return null;
  }
}

async function syncLocalAccountsToSupabase() {
  const localOnlyAccounts = getAllAccounts().filter(account => !account.id);

  for (const account of localOnlyAccounts) {
    if (!account.username && !account.email && !account.password && !account.license) {
      continue;
    }

    await insertAccount({
      ring: account.ring,
      username: account.username || "",
      email: account.email || "",
      password: account.password || "",
      license: account.license || ""
    });
  }
}

function loadSavedAccounts() {
  const savedAccounts = localStorage.getItem(storageKey);

  if (!savedAccounts) {
    return false;
  }

  try {
    const parsedAccounts = JSON.parse(savedAccounts);

    rings.forEach(r => {
      accountsData[r] = Array.isArray(parsedAccounts[r]) ? parsedAccounts[r] : [];
    });

    return hasAnyAccounts();
  } catch (e) {
    console.warn("Could not load saved accounts:", e);
    return false;
  }
}

function saveAccounts() {
  localStorage.setItem(storageKey, JSON.stringify(accountsData));
}

function normalizeDevice(device) {
  return {
    id: device.id || null,
    deviceName: device.deviceName || "",
    platform: device.platform || "",
    osVersion: device.osVersion || "",
    serialNumber: device.serialNumber || "",
    assetsReceived: device.assetsReceived || ""
  };
}

function loadSavedDevices() {
  const savedDevices = localStorage.getItem(deviceStorageKey);

  if (!savedDevices) {
    return false;
  }

  try {
    const parsedDevices = JSON.parse(savedDevices);

    rings.forEach(r => {
      devicesData[r] = Array.isArray(parsedDevices[r])
        ? parsedDevices[r].map(normalizeDevice)
        : [];
    });

    return hasAnyDevices();
  } catch (e) {
    console.warn("Could not load saved devices:", e);
    return false;
  }
}

function saveDevices() {
  localStorage.setItem(deviceStorageKey, JSON.stringify(devicesData));
}

function getAllDevices() {
  return rings.flatMap(r => devicesData[r].map(device => ({ ...device, ring: r })));
}

async function loadDevicesFromSupabase() {
  try {
    const response = await fetch(`${supabaseDevicesUrl}?select=id,ring,deviceName,platform,osVersion,serialNumber,assetsReceived&order=created_at.asc`, {
      headers: getSupabaseHeaders()
    });

    if (response.status === 404) {
      deviceSyncAvailable = false;
      return null;
    }

    if (!response.ok) {
      throw new Error(`Supabase device load failed: ${response.status}`);
    }

    const devices = await response.json();
    resetDevicesData();

    devices.forEach(device => {
      const normalizedDevice = normalizeDevice(device);

      if (rings.includes(device.ring || "")) {
        devicesData[device.ring].push(normalizedDevice);
      }
    });

    deviceSyncAvailable = true;
    saveDevices();
    return devices.length;
  } catch (e) {
    console.warn("Could not load devices from Supabase:", e);
    return null;
  }
}

async function insertDevice(device) {
  const response = await fetch(supabaseDevicesUrl, {
    method: "POST",
    headers: getSupabaseHeaders("return=representation"),
    body: JSON.stringify(device)
  });

  if (response.status === 404) {
    deviceSyncAvailable = false;
    throw new Error("Supabase devices table not found.");
  }

  if (!response.ok) {
    throw new Error(`Supabase device insert failed: ${response.status}`);
  }

  const insertedDevices = await response.json();
  deviceSyncAvailable = true;
  return normalizeDevice(insertedDevices[0]);
}

async function updateDeviceInSupabase(device) {
  if (!device.id) {
    throw new Error("Device id missing.");
  }

  const response = await fetch(`${supabaseDevicesUrl}?id=eq.${device.id}`, {
    method: "PATCH",
    headers: getSupabaseHeaders(),
    body: JSON.stringify({
      deviceName: device.deviceName,
      platform: device.platform,
      osVersion: device.osVersion,
      serialNumber: device.serialNumber,
      assetsReceived: device.assetsReceived
    })
  });

  if (response.status === 404) {
    deviceSyncAvailable = false;
    throw new Error("Supabase devices table not found.");
  }

  if (!response.ok) {
    throw new Error(`Supabase device update failed: ${response.status}`);
  }

  deviceSyncAvailable = true;
}

async function deleteDeviceFromSupabase(device) {
  if (!device.id) {
    return;
  }

  const response = await fetch(`${supabaseDevicesUrl}?id=eq.${device.id}`, {
    method: "DELETE",
    headers: getSupabaseHeaders()
  });

  if (response.status === 404) {
    deviceSyncAvailable = false;
    throw new Error("Supabase devices table not found.");
  }

  if (!response.ok) {
    throw new Error(`Supabase device delete failed: ${response.status}`);
  }

  deviceSyncAvailable = true;
}

async function syncLocalDevicesToSupabase() {
  if (!deviceSyncAvailable) {
    return;
  }

  const localOnlyDevices = getAllDevices().filter(device => !device.id || String(device.id).startsWith("local-"));

  for (const device of localOnlyDevices) {
    if (!device.deviceName && !device.platform && !device.osVersion && !device.serialNumber && !device.assetsReceived) {
      continue;
    }

    await insertDevice({
      ring: device.ring,
      deviceName: device.deviceName || "",
      platform: device.platform || "",
      osVersion: device.osVersion || "",
      serialNumber: device.serialNumber || "",
      assetsReceived: device.assetsReceived || ""
    });
  }
}

async function insertAccount(account) {
  const response = await fetch(supabaseAccountsUrl, {
    method: "POST",
    headers: getSupabaseHeaders("return=representation"),
    body: JSON.stringify(account)
  });

  if (!response.ok) {
    throw new Error(`Supabase insert failed: ${response.status}`);
  }

  const insertedAccounts = await response.json();
  return normalizeAccount(insertedAccounts[0]);
}

async function updateAccountInSupabase(account) {
  if (!account.id) {
    const insertedAccount = await insertAccount(account);
    Object.assign(account, insertedAccount);
    saveAccounts();
    return;
  }

  const response = await fetch(`${supabaseAccountsUrl}?id=eq.${account.id}`, {
    method: "PATCH",
    headers: getSupabaseHeaders(),
    body: JSON.stringify({
      username: account.username,
      email: account.email,
      password: account.password,
      license: account.license
    })
  });

  if (!response.ok) {
    throw new Error(`Supabase update failed: ${response.status}`);
  }
}

async function deleteAccountFromSupabase(account) {
  if (!account.id) {
    return;
  }

  const response = await fetch(`${supabaseAccountsUrl}?id=eq.${account.id}`, {
    method: "DELETE",
    headers: getSupabaseHeaders()
  });

  if (!response.ok) {
    throw new Error(`Supabase delete failed: ${response.status}`);
  }
}

function escapeAttribute(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function getLicenseOptions(selectedLicense) {
  return licenses.map(license => `
    <option ${license === selectedLicense ? "selected" : ""}>${escapeAttribute(license)}</option>
  `).join("");
}

function isEditableTableFocused() {
  const activeElement = document.activeElement;
  return Boolean(
    activeElement &&
    activeElement.closest &&
    (activeElement.closest("#accountTable") || activeElement.closest("#deviceTable"))
  );
}

function refreshVisiblePage() {
  loadMainPage();

  if (currentRing && document.getElementById("accountPage").style.display !== "none") {
    renderAccounts(currentRing);
  }
}

async function refreshAccountsFromSupabase(forceRefresh = false) {
  if (!forceRefresh && isEditableTableFocused()) {
    return;
  }

  const loadedCount = await loadAccountsFromSupabase();
  const loadedDevices = await loadDevicesFromSupabase();

  if (loadedCount !== null || loadedDevices !== null) {
    refreshVisiblePage();
  }
}

function loadMainPage() {
  const container = document.getElementById("mainPage");
  container.innerHTML = `
    <div class="section-title">
      <div>
        <h2>Select a ring</h2>
        <span>${rings.length} environments available</span>
      </div>
    </div>
    <div class="scenario-strip">
      <div class="scenario-item scenario-blue">
        <strong>Pilot rings</strong>
        <span>Fast validation for new accounts.</span>
      </div>
      <div class="scenario-item scenario-teal">
        <strong>Release rings</strong>
        <span>Stable account workspaces.</span>
      </div>
      <div class="scenario-item scenario-amber">
        <strong>Education</strong>
        <span>EDU and regional environments.</span>
      </div>
      <div class="scenario-item scenario-rose">
        <strong>Secure access</strong>
        <span>Identity and protected clouds.</span>
      </div>
    </div>
    <div class="ring-grid">
      ${rings.map(r => `
        <div class="ring-card" data-scenario="${ringScenarios[r].tone}" onclick="openRing('${r}')">
          <div class="ring-card-title">
            <span class="ring-card-icon">O</span>
            <span>${r}</span>
          </div>
          <div class="ring-card-footer">
            <span>${accountsData[r].length} accounts | ${devicesData[r].length} devices</span>
            <span class="scenario-badge">${ringScenarios[r].label}</span>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

function openRing(ring) {
  currentRing = ring;
  document.getElementById("mainPage").style.display = "none";
  const page = document.getElementById("accountPage");
  page.style.display = "block";

  renderAccounts(ring);
}

function renderAccounts(ring) {
  const page = document.getElementById("accountPage");

  page.innerHTML = `
    <div class="section-stack">
      <div class="panel">
        <div class="toolbar">
          <div>
            <h2>${ring} Workspace</h2>
            <p>Manage Teams accounts and device handoff details in one Android-friendly view.</p>
          </div>
          <button class="back-btn" onclick="goBack()">&lt;- Back</button>
        </div>

        <div class="panel-note">Install this app on Android from Chrome using Add to Home screen for a full-screen experience.</div>
      </div>

      <div class="panel">
        <div class="toolbar">
          <div>
            <h2>${ring} Accounts</h2>
            <p>Update saved credentials or submit a new Teams account request.</p>
          </div>
        </div>

        <div class="table-wrap">
          <table id="accountTable">
            <thead>
              <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Password</th>
                <th>License</th>
                <th class="actions-col">Action</th>
              </tr>
            </thead>
            <tbody>
              ${accountsData[ring].map((acc, i) => `
                <tr>
                  <td><input value="${escapeAttribute(acc.username)}" oninput="updateField('${ring}', ${i}, 'username', this.value)" /></td>
                  <td><input value="${escapeAttribute(acc.email)}" oninput="updateField('${ring}', ${i}, 'email', this.value)" /></td>
                  <td><input value="${escapeAttribute(acc.password)}" oninput="updateField('${ring}', ${i}, 'password', this.value)" /></td>
                  <td>
                    <select onchange="updateField('${ring}', ${i}, 'license', this.value)">
                      ${getLicenseOptions(acc.license)}
                    </select>
                  </td>
                  <td>
                    <div class="row-actions">
                      <button class="update-btn" onclick="updateAccountRow('${ring}', ${i})">Update</button>
                      <button class="delete-btn" onclick="deleteAccount('${ring}', ${i})">Delete</button>
                    </div>
                  </td>
                </tr>
              `).join("") || `
                <tr>
                  <td class="empty-row" colspan="5">No accounts added yet.</td>
                </tr>
              `}
            </tbody>
          </table>
        </div>

        <div class="button-row">
          <button class="secondary-btn" onclick="addAccount('${ring}')">+ Add Account</button>
        </div>

        <hr class="divider">

        <h3>Create Teams Account</h3>

        <div class="form-grid">
          <div>
            <label>Username</label>
            <input id="newUsername">
          </div>

          <div>
            <label>Email</label>
            <input id="newEmail">
          </div>

          <div>
            <label>Password</label>
            <input id="newPassword" type="password">
          </div>

          <div>
            <label>License</label>
            <select id="license">
              ${getLicenseOptions("Microsoft 365 E3")}
            </select>
          </div>
        </div>

        <div class="button-row">
          <button onclick="createTeamsAccount('${ring}')">Create Account</button>
        </div>
      </div>

      <div class="panel">
        <div class="toolbar">
          <div>
            <h2>${ring} Device Details</h2>
            <p>Track the device handoff details each user can update from their Android-installed app.</p>
            <p class="panel-note">${deviceSyncAvailable ? "Device details sync through Supabase when the devices table is available." : "Device details are currently stored only on this device until the Supabase devices table is created."}</p>
          </div>
        </div>

        <div class="table-wrap">
          <table id="deviceTable">
            <thead>
              <tr>
                <th>Device Name</th>
                <th>Platform</th>
                <th>OS Version</th>
                <th>Serial Number</th>
                <th>Assets Received</th>
                <th class="actions-col">Action</th>
              </tr>
            </thead>
            <tbody>
              ${devicesData[ring].map((device, i) => `
                <tr>
                  <td><input value="${escapeAttribute(device.deviceName)}" oninput="updateDeviceField('${ring}', ${i}, 'deviceName', this.value)" /></td>
                  <td><input value="${escapeAttribute(device.platform)}" oninput="updateDeviceField('${ring}', ${i}, 'platform', this.value)" /></td>
                  <td><input value="${escapeAttribute(device.osVersion)}" oninput="updateDeviceField('${ring}', ${i}, 'osVersion', this.value)" /></td>
                  <td><input value="${escapeAttribute(device.serialNumber)}" oninput="updateDeviceField('${ring}', ${i}, 'serialNumber', this.value)" /></td>
                  <td><textarea oninput="updateDeviceField('${ring}', ${i}, 'assetsReceived', this.value)">${escapeAttribute(device.assetsReceived)}</textarea></td>
                  <td>
                    <div class="row-actions">
                      <button class="update-btn" onclick="saveDeviceRow('${ring}', ${i})">Update</button>
                      <button class="delete-btn" onclick="deleteDevice('${ring}', ${i})">Delete</button>
                    </div>
                  </td>
                </tr>
              `).join("") || `
                <tr>
                  <td class="empty-row" colspan="6">No devices added yet.</td>
                </tr>
              `}
            </tbody>
          </table>
        </div>

        <div class="button-row">
          <button class="secondary-btn" onclick="addDevice('${ring}')">+ Add Device</button>
        </div>

        <hr class="divider">

        <h3>Add Device Details</h3>

        <div class="form-grid">
          <div>
            <label>Device Name</label>
            <input id="newDeviceName" placeholder="Galaxy S24, Pixel 8, Surface Duo">
          </div>

          <div>
            <label>Platform</label>
            <input id="newPlatform" placeholder="Android, iOS, Windows">
          </div>

          <div>
            <label>OS Version</label>
            <input id="newOsVersion" placeholder="Android 15">
          </div>

          <div>
            <label>Serial Number</label>
            <input id="newSerialNumber" placeholder="SN-123456789">
          </div>

          <div style="grid-column: 1 / -1;">
            <label>Assets Received</label>
            <textarea id="newAssetsReceived" placeholder="Charger, dock, SIM card, headset"></textarea>
          </div>
        </div>

        <div class="button-row">
          <button onclick="createDevice('${ring}')">Save Device Details</button>
        </div>
      </div>
    </div>
  `;
}

function updateField(ring, index, field, value) {
  accountsData[ring][index][field] = value;
  saveAccounts();
}

function updateDeviceField(ring, index, field, value) {
  devicesData[ring][index][field] = value;
  saveDevices();
}

async function updateAccountRow(ring, index) {
  try {
    await updateAccountInSupabase(accountsData[ring][index]);
    await refreshAccountsFromSupabase(true);
    alert("Account updated for all users.");
  } catch (e) {
    console.warn("Could not update account in Supabase:", e);
    alert("Update failed. Please check Supabase table permissions.");
  }
}

async function addAccount(ring) {
  const account = { ring, username: "", email: "", password: "", license: "Microsoft 365 E3" };

  try {
    const insertedAccount = await insertAccount(account);
    accountsData[ring].push(insertedAccount);
  } catch (e) {
    console.warn("Could not add account to Supabase:", e);
    alert("Add failed. Please check Supabase table permissions.");
  }

  saveAccounts();
  refreshVisiblePage();
}

async function deleteAccount(ring, index) {
  const account = accountsData[ring][index];
  accountsData[ring].splice(index, 1);
  saveAccounts();
  loadMainPage();
  renderAccounts(ring);

  try {
    await deleteAccountFromSupabase(account);
    await refreshAccountsFromSupabase(true);
  } catch (e) {
    console.warn("Could not delete account from Supabase:", e);
    alert("Deleted locally, but Supabase delete failed. Please check table permissions.");
  }
}

async function createTeamsAccount(ring) {
  const username = document.getElementById("newUsername").value;
  const email = document.getElementById("newEmail").value;
  const password = document.getElementById("newPassword").value;
  const license = document.getElementById("license").value;

  const payload = {
    ring,
    username,
    email,
    password,
    license
  };

  console.log("Creating account:", payload);

  try {
    const insertedAccount = await insertAccount(payload);
    accountsData[ring].push(insertedAccount);
    saveAccounts();
    refreshVisiblePage();
    alert("Account saved to Supabase!");
  } catch (e) {
    console.warn("Could not save account to Supabase:", e);
    alert("Save failed. Please check Supabase table permissions.");
  }
}

function addDevice(ring) {
  devicesData[ring].push(normalizeDevice({
    id: `local-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`
  }));
  saveDevices();
  refreshVisiblePage();
}

async function saveDeviceRow(ring, index) {
  const device = devicesData[ring][index];
  saveDevices();

  if (!deviceSyncAvailable) {
    loadMainPage();
    renderAccounts(ring);
    alert("Device details updated locally. Create the Supabase devices table to sync them for all users.");
    return;
  }

  try {
    if (!device.id || String(device.id).startsWith("local-")) {
      const insertedDevice = await insertDevice({
        ring,
        deviceName: device.deviceName,
        platform: device.platform,
        osVersion: device.osVersion,
        serialNumber: device.serialNumber,
        assetsReceived: device.assetsReceived
      });

      devicesData[ring][index] = insertedDevice;
      saveDevices();
    } else {
      await updateDeviceInSupabase(device);
    }

    await loadDevicesFromSupabase();
    loadMainPage();
    renderAccounts(ring);
    alert("Device details updated for all users.");
  } catch (e) {
    console.warn("Could not update device in Supabase:", e);
    loadMainPage();
    renderAccounts(ring);
    alert("Device update saved locally, but Supabase sync is not ready yet.");
  }
}

function deleteDevice(ring, index) {
  const device = devicesData[ring][index];
  devicesData[ring].splice(index, 1);
  saveDevices();
  loadMainPage();
  renderAccounts(ring);

  if (!deviceSyncAvailable) {
    return;
  }

  deleteDeviceFromSupabase(device).catch(e => {
    console.warn("Could not delete device from Supabase:", e);
    alert("Device deleted locally, but Supabase delete failed.");
  });
}

async function createDevice(ring) {
  const payload = {
    ring,
    deviceName: document.getElementById("newDeviceName").value,
    platform: document.getElementById("newPlatform").value,
    osVersion: document.getElementById("newOsVersion").value,
    serialNumber: document.getElementById("newSerialNumber").value,
    assetsReceived: document.getElementById("newAssetsReceived").value
  };

  if (!deviceSyncAvailable) {
    devicesData[ring].push(normalizeDevice({
      ...payload,
      id: `local-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`
    }));
    saveDevices();
    refreshVisiblePage();
    alert("Device details saved locally. Create the Supabase devices table to sync them for all users.");
    return;
  }

  try {
    const insertedDevice = await insertDevice(payload);
    devicesData[ring].push(insertedDevice);
    saveDevices();
    refreshVisiblePage();
    alert("Device details saved to Supabase!");
  } catch (e) {
    console.warn("Could not save device to Supabase:", e);
    devicesData[ring].push(normalizeDevice({
      ...payload,
      id: `local-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`
    }));
    saveDevices();
    refreshVisiblePage();
    alert("Device details saved locally, but Supabase sync is not ready yet.");
  }
}

function goBack() {
  currentRing = null;
  document.getElementById("mainPage").style.display = "block";
  document.getElementById("accountPage").style.display = "none";
  loadMainPage();
}

async function initApp() {
  const loadedFromLocalStorage = loadSavedAccounts();
  const loadedDevicesFromLocalStorage = loadSavedDevices();
  loadMainPage();

  if (loadedFromLocalStorage) {
    try {
      await syncLocalAccountsToSupabase();
    } catch (e) {
      console.warn("Could not sync local accounts to Supabase:", e);
    }
  }

  const loadedFromSupabase = await loadAccountsFromSupabase();
  const loadedDevicesFromSupabase = await loadDevicesFromSupabase();

  if (loadedDevicesFromLocalStorage) {
    try {
      await syncLocalDevicesToSupabase();
      await loadDevicesFromSupabase();
    } catch (e) {
      console.warn("Could not sync local devices to Supabase:", e);
    }
  }

  if (
    loadedFromSupabase > 0 ||
    loadedDevicesFromSupabase > 0 ||
    ((loadedFromSupabase === 0 || loadedDevicesFromSupabase === 0) && !loadedFromLocalStorage && !loadedDevicesFromLocalStorage)
  ) {
    loadMainPage();
  }

  refreshTimer = setInterval(refreshAccountsFromSupabase, refreshIntervalMs);
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(error => {
      console.warn("Service worker registration failed:", error);
    });
  });
}

initApp();
</script>
